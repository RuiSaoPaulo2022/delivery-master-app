<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>交维大师 - 登录</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #070d18;
      overflow: hidden;
    }

    /* Animated background — deep navy with subtle color wash */
    .bg-layer {
      position: fixed;
      inset: 0;
      z-index: 0;
      background:
        radial-gradient(ellipse 80% 60% at 20% 80%, rgba(31,73,125,0.3) 0%, transparent 60%),
        radial-gradient(ellipse 60% 50% at 80% 20%, rgba(46,125,50,0.2) 0%, transparent 60%),
        radial-gradient(ellipse 50% 40% at 50% 50%, rgba(33,102,178,0.12) 0%, transparent 70%),
        linear-gradient(160deg, #070d18 0%, #0c1a30 40%, #0a2035 100%);
    }

    /* Floating orbs matching logo's cyan → pink neon palette */
    .bg-particles {
      position: fixed;
      inset: 0;
      z-index: 0;
      overflow: hidden;
    }

    .bg-particles::before,
    .bg-particles::after {
      content: '';
      position: absolute;
      border-radius: 50%;
      opacity: 0.07;
      animation: float 14s ease-in-out infinite;
    }

    .bg-particles::before {
      width: 350px; height: 350px;
      background: linear-gradient(135deg, #00e5ff, #7b2ff7);
      top: 8%; left: -8%;
      filter: blur(40px);
    }

    .bg-particles::after {
      width: 300px; height: 300px;
      background: linear-gradient(135deg, #7b2ff7, #ff2d95);
      bottom: 8%; right: -6%;
      animation-delay: -7s;
      animation-direction: reverse;
      filter: blur(40px);
    }

    @keyframes float {
      0%, 100% { transform: translate(0, 0) scale(1); }
      33% { transform: translate(35px, -25px) scale(1.06); }
      66% { transform: translate(-25px, 18px) scale(0.94); }
    }

    /* Grid pattern overlay */
    .bg-grid {
      position: fixed;
      inset: 0;
      z-index: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.015) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.015) 1px, transparent 1px);
      background-size: 48px 48px;
    }

    /* Login card */
    .login-card {
      position: relative;
      z-index: 10;
      width: 100%;
      max-width: 420px;
      margin: 20px;
    }

    /* ===== LOGO AREA — transparent PNG + subtle glow ===== */
    .logo-area {
      text-align: center;
      margin-bottom: 28px;
    }

    .logo-container {
      position: relative;
      display: inline-block;
      margin-bottom: 16px;
    }

    /* Stable neon aura — no rotation, just subtle breathing glow */
    .logo-glow-ring {
      position: absolute;
      inset: -20px -28px;
      border-radius: 30% 70% 60% 40% / 50% 40% 60% 50%;
      background: conic-gradient(
        from 0deg,
        rgba(0, 229, 255, 0.10),
        rgba(123, 47, 247, 0.14),
        rgba(255, 45, 149, 0.10),
        rgba(0, 229, 255, 0.10)
      );
      filter: blur(28px);
      opacity: 0;
      animation: glowBreathe 6s ease-in-out infinite;
      z-index: -1;
    }

    @keyframes glowBreathe {
      0%, 100% { opacity: 0.45; transform: scale(0.97); }
      50% { opacity: 0.75; transform: scale(1.01); }
    }

    /* Shield image — transparent PNG, no float, stable */
    .logo-shield {
      display: block;
      width: 220px;
      height: auto;
      object-fit: contain;
      /* Subtle glow built into the image via drop-shadow */
      filter: drop-shadow(0 0 18px rgba(0, 229, 255, 0.18))
              drop-shadow(0 0 40px rgba(123, 47, 247, 0.12));
      transition: filter 0.6s ease;
      position: relative;
      z-index: 1;
    }

    .logo-shield:hover {
      filter: drop-shadow(0 0 24px rgba(0, 229, 255, 0.28))
              drop-shadow(0 0 56px rgba(123, 47, 247, 0.20));
    }

    /* Title & subtitle */
    .logo-title {
      font-size: 26px;
      font-weight: 700;
      color: #fff;
      letter-spacing: 3px;
      margin-bottom: 4px;
      text-shadow: 0 2px 12px rgba(33, 102, 178, 0.3);
    }

    .logo-subtitle {
      font-size: 13px;
      color: rgba(255,255,255,0.38);
      letter-spacing: 1.5px;
      font-weight: 400;
    }

    .logo-subtitle span {
      background: linear-gradient(90deg, #00e5ff, #7b2ff7);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* Form container - glass morphism */
    .form-container {
      position: relative;
      background: rgba(255,255,255,0.038);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 18px;
      padding: 32px 28px;
      backdrop-filter: blur(28px);
      -webkit-backdrop-filter: blur(28px);
      box-shadow:
        0 12px 40px rgba(0,0,0,0.35),
        0 2px 8px rgba(0,0,0,0.15),
        inset 0 1px 0 rgba(255,255,255,0.04);
    }

    /* Alert messages */
    .alert {
      padding: 11px 15px;
      border-radius: 9px;
      margin-bottom: 18px;
      font-size: 13px;
      display: none;
      align-items: center;
      gap: 8px;
      animation: slideDown 0.25s ease-out;
    }

    @keyframes slideDown {
      from { opacity: 0; transform: translateY(-8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .alert.error {
      background: rgba(220,38,38,0.1);
      border: 1px solid rgba(220,38,38,0.18);
      color: #fca5a5;
    }

    .alert.success {
      background: rgba(34,197,94,0.1);
      border: 1px solid rgba(34,197,94,0.18);
      color: #86efac;
    }

    /* Form fields */
    .form-group {
      margin-bottom: 18px;
    }

    .form-group label {
      display: block;
      color: rgba(255,255,255,0.55);
      font-size: 12px;
      font-weight: 500;
      margin-bottom: 8px;
      letter-spacing: 0.5px;
    }

    .form-group input {
      width: 100%;
      padding: 12px 16px;
      background: rgba(255,255,255,0.055);
      border: 1px solid rgba(255,255,255,0.09);
      border-radius: 10px;
      font-size: 14px;
      color: #fff;
      transition: all 0.3s ease;
      outline: none;
    }

    .form-group input::placeholder {
      color: rgba(255,255,255,0.22);
    }

    .form-group input:focus {
      background: rgba(255,255,255,0.08);
      border-color: rgba(0, 229, 255, 0.45);
      box-shadow: 0 0 0 3px rgba(0, 229, 255, 0.08), 0 0 16px rgba(0, 229, 255, 0.06);
    }

    /* Submit button */
    .btn-submit {
      width: 100%;
      padding: 13px;
      background: linear-gradient(135deg, #2166B2 0%, #1a4f8f 100%);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      letter-spacing: 1px;
      position: relative;
      overflow: hidden;
    }

    .btn-submit::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, transparent 0%, rgba(255,255,255,0.08) 100%);
      opacity: 0;
      transition: opacity 0.3s;
    }

    .btn-submit:hover:not(:disabled) {
      transform: translateY(-1px);
      box-shadow: 0 4px 24px rgba(33,102,178,0.4), 0 0 16px rgba(33,102,178,0.15);
    }

    .btn-submit:hover:not(:disabled)::before { opacity: 1; }

    .btn-submit:active:not(:disabled) {
      transform: translateY(0);
    }

    .btn-submit:disabled {
      background: rgba(255,255,255,0.08);
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    /* Loading spinner inside button */
    .btn-submit .spinner {
      display: none;
      width: 18px;
      height: 18px;
      border: 2px solid rgba(255,255,255,0.25);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin-right: 8px;
      vertical-align: middle;
    }

    .btn-submit.loading .spinner { display: inline-block; }
    .btn-submit.loading .btn-text { opacity: 0.85; }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Server status indicator */
    .server-status {
      text-align: center;
      margin-bottom: 14px;
      font-size: 12px;
      display: none;
    }
    .server-status.checking { display: block; color: rgba(255,255,255,0.45); }
    .server-status.online  { display: block; color: rgba(34,197,94,0.7); }
    .server-status.offline { display: block; color: rgba(251,146,60,0.8); }

    /* Form disabled overlay */
    .form-disabled {
      position: relative;
    }
    .form-disabled::after {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(7,13,24,0.55);
      border-radius: 18px;
      z-index: 5;
      cursor: not-allowed;
    }

    /* Toggle link */
    .toggle-link {
      text-align: center;
      margin-top: 18px;
      font-size: 13px;
      color: rgba(255,255,255,0.36);
    }

    .toggle-link a {
      color: rgba(0, 229, 255, 0.75);
      text-decoration: none;
      font-weight: 500;
      transition: all 0.2s;
    }

    .toggle-link a:hover {
      color: #00e5ff;
      text-shadow: 0 0 12px rgba(0, 229, 255, 0.3);
    }

    /* Form toggle */
    .form-panel { display: none; }
    .form-panel.active { display: block; }

    /* Footer */
    .login-footer {
      text-align: center;
      margin-top: 22px;
      font-size: 11px;
      color: rgba(255,255,255,0.18);
      letter-spacing: 0.5px;
    }

    /* QR Code download section */
    .qr-download {
      text-align: center;
      margin-top: 24px;
      padding-top: 20px;
      border-top: 1px solid rgba(255,255,255,0.06);
    }

    .qr-download-title {
      font-size: 13px;
      color: rgba(255,255,255,0.55);
      margin-bottom: 12px;
      font-weight: 500;
      letter-spacing: 0.5px;
    }

    .qr-download-title .highlight {
      color: rgba(0, 229, 255, 0.8);
      font-weight: 600;
    }

    .qr-download-img {
      width: 140px;
      height: 160px;
      object-fit: contain;
      border-radius: 10px;
      margin: 0 auto;
      display: block;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
    }

    .qr-download-img:hover {
      transform: scale(1.05);
      box-shadow: 0 6px 28px rgba(0, 229, 255, 0.15), 0 4px 20px rgba(0, 0, 0, 0.3);
    }

    .qr-download-hint {
      margin-top: 8px;
      font-size: 11px;
      color: rgba(255,255,255,0.3);
    }

    /* Password strength indicator */
    .pwd-strength {
      margin-top: 6px;
      font-size: 11px;
      min-height: 16px;
      transition: color 0.2s;
    }
    .pwd-strength.weak   { color: #fca5a5; }
    .pwd-strength.medium { color: #fde68a; }
    .pwd-strength.strong { color: #86efac; }

    /* Change password modal overlay */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(7,13,24,0.85);
      backdrop-filter: blur(8px);
      z-index: 1000;
      display: none;
      justify-content: center;
      align-items: center;
    }
    .modal-overlay.active { display: flex; }

    .modal-box {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 18px;
      padding: 28px 24px;
      max-width: 380px;
      width: 90%;
      backdrop-filter: blur(28px);
      box-shadow: 0 16px 48px rgba(0,0,0,0.4);
      animation: slideDown 0.3s ease-out;
    }

    .modal-title {
      color: #fff;
      font-size: 17px;
      font-weight: 600;
      margin-bottom: 4px;
      text-align: center;
    }

    .modal-desc {
      color: rgba(255,255,255,0.45);
      font-size: 12px;
      text-align: center;
      margin-bottom: 20px;
    }

    /* Responsive */
    @media (max-width: 480px) {
      .login-card { margin: 16px; }
      .form-container { padding: 24px 20px; }
      .logo-shield { width: 180px; }
      .logo-title { font-size: 22px; letter-spacing: 2px; }
    }
  </style>
</head>
<body>

  <div class="bg-layer"></div>
  <div class="bg-particles"></div>
  <div class="bg-grid"></div>

  <div class="login-card">
    <div class="logo-area">
      <div class="logo-container">
        <div class="logo-glow-ring"></div>
        <img src="assets/logo-shield.png" alt="D&M Shield" class="logo-shield">
      </div>
      <div class="logo-title">交维大师</div>
      <div class="logo-subtitle"><span>Delivery &amp; Ops Master</span></div>
    </div>

    <div class="form-container" id="formContainer">
      <div id="server-status" class="server-status checking">⏳ 正在连接服务器…</div>
      <div id="error-msg" class="alert error"></div>
      <div id="success-msg" class="alert success"></div>

      <!-- Login (only panel, register removed — admin-only via API) -->
      <div id="panel-login" class="form-panel active">
        <form id="loginForm">
          <div class="form-group">
            <label>用户名</label>
            <input type="text" id="login-user" required placeholder="请输入用户名" autocomplete="username">
          </div>
          <div class="form-group">
            <label>密码</label>
            <input type="password" id="login-pass" required placeholder="请输入密码" autocomplete="current-password">
          </div>
          <button type="submit" class="btn-submit" id="btn-login">
            <span class="spinner"></span>
            <span class="btn-text">登 录</span>
          </button>
        </form>
      </div>
    </div>

    <div class="login-footer">&copy; 2026 Delivery Master</div>

    <div class="qr-download">
      <div class="qr-download-title">📱 请扫描二维码下载 <span class="highlight">手机版交维大师</span></div>
      <img src="assets/qrcode-shield-download.png" alt="下载交维大师APP" class="qr-download-img">
      <div class="qr-download-hint">支持 Android · 中 / 英 / 葡萄牙语</div>
    </div>
  </div>

  <!-- Change Password Modal -->
  <div class="modal-overlay" id="changePwdModal">
    <div class="modal-box">
      <div class="modal-title">🔒 首次登录 — 修改密码</div>
      <div class="modal-desc">密码至少8位，需包含数字和字母</div>
      <div id="modal-error" class="alert error" style="margin-top:12px"></div>
      <form id="changePwdForm">
        <div class="form-group">
          <label>当前密码</label>
          <input type="password" id="cpd-old" required placeholder="请输入当前密码" autocomplete="current-password">
        </div>
        <div class="form-group">
          <label>新密码</label>
          <input type="password" id="cpd-new" required placeholder="至少8位，含数字+字母" autocomplete="new-password">
          <div class="pwd-strength" id="pwdStrength"></div>
        </div>
        <div class="form-group">
          <label>确认新密码</label>
          <input type="password" id="cpd-confirm" required placeholder="再次输入新密码" autocomplete="new-password">
        </div>
        <button type="submit" class="btn-submit" id="btn-change-pwd">
          <span class="spinner"></span>
          <span class="btn-text">确认修改</span>
        </button>
      </form>
    </div>
  </div>

<script>
const API = window.location.origin;

/* ---------- SHA-256 client-side hash ---------- */
async function sha256(text) {
  const encoder = new TextEncoder();
  const data = encoder.encode(text);
  const hashBuffer = await crypto.subtle.digest('SHA-256', data);
  const hashArray = Array.from(new Uint8Array(hashBuffer));
  return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
}

/* ---------- Password strength check ---------- */
function checkPwdStrength(pwd) {
  if (!pwd || pwd.length < 8) return { level: 0, text: '' };
  let score = 0;
  if (pwd.length >= 8)  score++;
  if (pwd.length >= 12) score++;
  if (/[a-z]/.test(pwd) && /[A-Z]/.test(pwd)) score++;
  if (/[0-9]/.test(pwd)) score++;
  if (/[^a-zA-Z0-9]/.test(pwd)) score++;
  if (score <= 2) return { level: 1, text: '弱 — 建议增加长度和特殊字符' };
  if (score <= 3) return { level: 2, text: '中 — 可以更复杂' };
  return { level: 3, text: '强' };
}

/* ---------- helpers ---------- */
function showMsg(type, text) {
  const el = document.getElementById(type + '-msg');
  el.textContent = text;
  el.style.display = 'flex';
  clearTimeout(el._timer);
  el._timer = setTimeout(() => { el.style.display = 'none'; }, 5000);
}

function setBtnLoading(btnId, loading) {
  const btn = document.getElementById(btnId);
  if (!btn) return;
  btn.classList.toggle('loading', loading);
  btn.disabled = loading;
}

/* ---------- server connectivity check ---------- */
async function checkServer() {
  const statusEl = document.getElementById('server-status');
  const container = document.getElementById('formContainer');
  try {
    const r = await fetch(API + '/api/data/manifest.json', { method: 'GET', cache: 'no-cache' });
    if (r.ok) {
      statusEl.className = 'server-status online';
      statusEl.textContent = '✅ 服务器已连接';
      container.classList.remove('form-disabled');
      setTimeout(() => { statusEl.style.display = 'none'; }, 2000);
    } else {
      throw new Error('bad status');
    }
  } catch (e) {
    statusEl.className = 'server-status offline';
    statusEl.innerHTML = '⚠️ 无法连接服务器，请确认 <code>server.js</code> 已启动<br><span style="font-size:11px;opacity:0.6">提示：在 交维大师 目录运行 node server.js</span>';
    container.classList.add('form-disabled');
    setTimeout(checkServer, 3000);
  }
}

/* ---------- login (SHA-256 hashed) ---------- */
document.getElementById('loginForm').addEventListener('submit', async e => {
  e.preventDefault();
  const username = document.getElementById('login-user').value.trim();
  const password = document.getElementById('login-pass').value;
  if (!username || !password) { showMsg('error', '用户名和密码不能为空'); return; }

  setBtnLoading('btn-login', true);
  try {
    // Client-side SHA-256 hash before sending
    const hashedPwd = await sha256(password);

    const r = await fetch(API + '/api/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password: hashedPwd })
    });
    const data = await r.json();
    if (!r.ok) { showMsg('error', data.error || '登录失败'); setBtnLoading('btn-login', false); return; }

    // Store complete token + user info
    localStorage.setItem('token', data.token);
    localStorage.setItem('user', JSON.stringify(data.user));

    // Check if first login (needChangePwd)
    if (data.user.needChangePwd) {
      setBtnLoading('btn-login', false);
      document.getElementById('changePwdModal').classList.add('active');
      document.getElementById('cpd-old').focus();
    } else {
      // Redirect to main page
      window.location.href = '/index.html';
    }
  } catch (err) {
    showMsg('error', '无法连接服务器，请确认 server.js 已启动');
    setBtnLoading('btn-login', false);
  }
});

/* ---------- change password (first login forced) ---------- */
document.getElementById('cpd-new').addEventListener('input', function() {
  const strength = checkPwdStrength(this.value);
  const el = document.getElementById('pwdStrength');
  if (strength.level === 0) { el.textContent = ''; el.className = 'pwd-strength'; return; }
  el.textContent = strength.text;
  el.className = 'pwd-strength ' + (strength.level === 1 ? 'weak' : strength.level === 2 ? 'medium' : 'strong');
});

document.getElementById('changePwdForm').addEventListener('submit', async e => {
  e.preventDefault();
  const oldPwd = document.getElementById('cpd-old').value;
  const newPwd = document.getElementById('cpd-new').value;
  const confirmPwd = document.getElementById('cpd-confirm').value;

  if (!oldPwd || !newPwd || !confirmPwd) { showMsg('error', '所有字段必填'); return; }
  if (newPwd !== confirmPwd) { showMsg('error', '两次输入的新密码不一致'); return; }
  if (newPwd.length < 8) { showMsg('error', '新密码至少8位'); return; }
  if (!/[a-zA-Z]/.test(newPwd) || !/[0-9]/.test(newPwd)) {
    showMsg('error', '新密码必须包含数字和字母'); return;
  }

  setBtnLoading('btn-change-pwd', true);
  try {
    const hashedOld = await sha256(oldPwd);
    const hashedNew = await sha256(newPwd);

    const token = localStorage.getItem('token');
    const r = await fetch(API + '/api/auth/change-password', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': 'Bearer ' + token
      },
      body: JSON.stringify({ oldPassword: hashedOld, newPassword: hashedNew })
    });
    const data = await r.json();
    if (!r.ok) { showMsg('error', data.error || '修改失败'); setBtnLoading('btn-change-pwd', false); return; }

    // Update stored token and user
    localStorage.setItem('token', data.token);
    localStorage.setItem('user', JSON.stringify(data.user));

    showMsg('success', '密码修改成功，正在跳转...');
    setTimeout(() => { window.location.href = '/index.html'; }, 800);
  } catch (err) {
    showMsg('error', '无法连接服务器');
    setBtnLoading('btn-change-pwd', false);
  }
});

/* ---------- init ---------- */
checkServer();
</script>
</body>
</html>
