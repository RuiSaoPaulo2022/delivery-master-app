<style>

*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}

body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;background:linear-gradient(135deg,#1a1a2e 0%,#16213e 50%,#0f3460 100%);min-height:100vh;color:#fff;overflow:hidden}



/* Header */

.header{background:rgba(0,0,0,0.3);padding:8px 20px;display:flex;align-items:center;border-bottom:1px solid rgba(255,255,255,0.1);height:64px;gap:16px}

.header h1{font-size:1.3em;background:linear-gradient(90deg,#00d9ff,#00ff88);-webkit-background-clip:text;-webkit-text-fill-color:transparent;white-space:nowrap;flex-shrink:0}

.stats-bar{display:flex;gap:20px;flex-shrink:0}

.stat-item{text-align:center}

.stat-value{font-size:1.3em;font-weight:bold;color:#00d9ff}

.stat-label{font-size:0.7em;color:#888;text-transform:uppercase;letter-spacing:0.5px}

.header-spacer{flex:1}

.filter-group{display:flex;flex-direction:column;gap:2px}

.filter-group label{font-size:0.7em;color:#888;text-transform:uppercase}

.filter-group select{background:rgba(0,0,0,0.5);color:#fff;border:1px solid rgba(0,217,255,0.5);padding:4px 8px;border-radius:5px;font-size:0.85em;cursor:pointer;outline:none;min-width:100px}

.filter-group select:hover{border-color:#00d9ff;background:rgba(0,217,255,0.1)}

.filter-group select option{background:#1a1a2e;color:#fff}

.lang-select{background:rgba(0,0,0,0.5);color:#fff;border:1px solid rgba(0,217,255,0.5);padding:6px 10px;border-radius:5px;font-size:0.85em;cursor:pointer;outline:none}

.lang-select option{background:#1a1a2e;color:#fff}

.upload-btn{background:rgba(0,217,255,0.2);color:#00d9ff;border:1px solid rgba(0,217,255,0.5);padding:6px 12px;border-radius:5px;font-size:0.8em;cursor:pointer;transition:all 0.3s;white-space:nowrap}

.upload-btn:hover{background:rgba(0,217,255,0.3)}

/* Back button */
.back-btn{width:28px;height:28px;border:none;background:rgba(255,255,255,0.1);border-radius:6px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background 0.2s;flex-shrink:0}
.back-btn:hover{background:rgba(255,255,255,0.2)}
.back-btn svg{width:16px;height:16px}


/* Main layout */

.main-container{display:flex;height:calc(100vh - 64px)}

.map-section{flex:2;position:relative;display:flex;align-items:center;justify-content:center;padding:10px}

.brazil-map{width:100%;height:100%;max-width:680px;max-height:680px}

.brazil-map path{stroke:rgba(255,255,255,0.4);stroke-width:0.8;cursor:pointer;transition:fill 0.3s,stroke 0.3s}

.brazil-map path:hover{stroke:#00d9ff;stroke-width:1.5;filter:drop-shadow(0 0 6px rgba(0,217,255,0.6))}

.brazil-map path.selected-state{stroke:#00ff88;stroke-width:2;filter:drop-shadow(0 0 10px rgba(0,255,136,0.7))}



/* Legend */

.legend{position:absolute;bottom:20px;left:20px;background:rgba(0,0,0,0.7);padding:12px 16px;border-radius:10px;font-size:0.8em;display:flex;flex-direction:column;gap:4px}

.legend-item{display:flex;align-items:center;gap:8px}

.legend-color{width:14px;height:14px;border-radius:3px}



/* Right panel */

.project-panel{flex:1;background:rgba(0,0,0,0.3);border-left:1px solid rgba(255,255,255,0.1);display:flex;flex-direction:column;min-width:340px;max-width:420px}

.panel-header{padding:12px 16px;background:rgba(0,217,255,0.08);border-bottom:1px solid rgba(0,217,255,0.2)}

.panel-header h2{font-size:1.1em;color:#00d9ff;margin-bottom:8px}

.filter-bar{display:flex;gap:6px;flex-wrap:wrap}

.filter-btn{padding:4px 10px;border:1px solid rgba(255,255,255,0.2);background:transparent;color:#888;border-radius:12px;cursor:pointer;font-size:0.75em;transition:all 0.2s}

.filter-btn:hover,.filter-btn.active{background:#00d9ff;color:#000;border-color:#00d9ff}

.filter-btn.all{border-color:#00ff88}

.filter-btn.all.active{background:#00ff88}

.reset-btn{padding:4px 10px;border:1px solid #e74c3c;background:rgba(231,76,60,0.15);color:#e74c3c;border-radius:12px;cursor:pointer;font-size:0.75em;display:none}

.reset-btn:hover{background:#e74c3c;color:#fff}



/* Project list */

.project-list{flex:1;overflow-y:auto;padding:8px}

.project-list::-webkit-scrollbar{width:5px}

.project-list::-webkit-scrollbar-track{background:rgba(255,255,255,0.03)}

.project-list::-webkit-scrollbar-thumb{background:rgba(0,217,255,0.3);border-radius:3px}

.project-card{background:rgba(255,255,255,0.04);border-radius:8px;padding:10px 12px;margin-bottom:6px;cursor:pointer;transition:all 0.2s;border-left:3px solid transparent}

.project-card:hover{background:rgba(0,217,255,0.08);transform:translateX(4px)}

.project-card.status-maintenance{border-left-color:#27ae60}

.project-card.status-delivery{border-left-color:#f39c12}

.project-card.status-poc{border-left-color:#3498db}

.project-card.status-done{border-left-color:#9b59b6}

.project-card.status-pending{border-left-color:#e74c3c}

.card-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}

.card-name{font-weight:bold;font-size:0.9em;color:#fff}

.card-state{font-size:0.7em;color:#888;background:rgba(255,255,255,0.08);padding:2px 7px;border-radius:8px}

.card-info{font-size:0.78em;color:#aaa;display:flex;gap:12px}

.card-info span{display:flex;align-items:center;gap:4px}

.no-data{text-align:center;padding:40px 20px;color:#666;font-size:0.9em}



/* Tooltip */

.tooltip{position:fixed;z-index:100;background:rgba(10,10,30,0.95);border:1px solid rgba(0,217,255,0.4);border-radius:10px;padding:0;display:none;max-width:380px;box-shadow:0 8px 32px rgba(0,0,0,0.5)}

.tooltip-header{padding:10px 14px;font-weight:bold;font-size:1em;color:#00d9ff;border-bottom:1px solid rgba(255,255,255,0.1);display:flex;justify-content:space-between;align-items:center}

.tooltip-count{font-size:0.75em;color:#888;font-weight:normal}

.tooltip-body{padding:8px 0;max-height:260px;overflow-y:auto}

.tooltip-table{width:100%;border-collapse:collapse;font-size:0.8em}

.tooltip-table th{padding:6px 10px;text-align:left;color:#888;font-weight:normal;font-size:0.75em;border-bottom:1px solid rgba(255,255,255,0.1);background:rgba(255,255,255,0.03)}

.tooltip-table td{padding:5px 10px;border-bottom:1px solid rgba(255,255,255,0.05);color:#ccc}

.tooltip-table tr:hover td{background:rgba(0,217,255,0.06)}

.tooltip-empty{padding:16px;text-align:center;color:#666;font-size:0.8em}

.tooltip-hint{padding:6px 14px 10px;text-align:center;font-size:0.7em;color:#555;border-top:1px solid rgba(255,255,255,0.05)}



/* Detail Modal */

.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.7);z-index:200;display:none;align-items:center;justify-content:center}

.modal-overlay.active{display:flex}

.modal{background:#12122a;border:1px solid rgba(0,217,255,0.3);border-radius:16px;width:90%;max-width:800px;max-height:85vh;display:flex;flex-direction:column;box-shadow:0 16px 64px rgba(0,0,0,0.6);animation:modalIn 0.3s ease}

@keyframes modalIn{from{opacity:0;transform:scale(0.95) translateY(20px)}to{opacity:1;transform:scale(1) translateY(0)}}

.modal-header{padding:16px 20px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid rgba(255,255,255,0.08)}

.modal-title{font-size:1.2em;font-weight:bold;color:#00d9ff}

.modal-close{background:none;border:none;color:#888;font-size:1.4em;cursor:pointer;padding:4px 8px;border-radius:6px;transition:all 0.2s}

.modal-close:hover{color:#fff;background:rgba(255,255,255,0.1)}

.modal-tabs{display:flex;border-bottom:1px solid rgba(255,255,255,0.08);padding:0 20px;gap:0}

.modal-tab{padding:12px 20px;cursor:pointer;color:#888;font-size:0.9em;border-bottom:2px solid transparent;transition:all 0.2s;white-space:nowrap}

.modal-tab:hover{color:#fff}

.modal-tab.active{color:#00d9ff;border-bottom-color:#00d9ff;background:rgba(0,217,255,0.05)}

.modal-body{flex:1;padding:20px;overflow-y:auto}

.modal-body::-webkit-scrollbar{width:5px}

.modal-body::-webkit-scrollbar-track{background:rgba(255,255,255,0.03)}

.modal-body::-webkit-scrollbar-thumb{background:rgba(0,217,255,0.3);border-radius:3px}

.tab-panel{display:none;animation:fadeIn 0.3s ease}

.tab-panel.active{display:block}

@keyframes fadeIn{from{opacity:0}to{opacity:1}}



/* Info grid in detail */

.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}

.info-item{background:rgba(255,255,255,0.04);border-radius:8px;padding:12px;border:1px solid rgba(255,255,255,0.06)}

.info-item .label{font-size:0.75em;color:#888;margin-bottom:4px;text-transform:uppercase;letter-spacing:0.5px}

.info-item .value{font-size:0.95em;color:#fff;word-break:break-all}

.info-item.full-width{grid-column:1/-1}

.device-table{width:100%;border-collapse:collapse;margin-top:8px;font-size:0.85em}

.device-table th{background:rgba(0,217,255,0.15);padding:8px;text-align:left;color:#00d9ff;border-bottom:2px solid rgba(0,217,255,0.3)}

.device-table td{padding:8px;border-bottom:1px solid rgba(255,255,255,0.06);color:#ccc}

.device-table tr:hover td{background:rgba(255,255,255,0.03)}



/* Placeholder tabs */

.placeholder-panel{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:250px;color:#555}

.placeholder-icon{font-size:3em;margin-bottom:16px;opacity:0.4}

.placeholder-text{font-size:1em;margin-bottom:8px}

.placeholder-hint{font-size:0.8em;color:#444}



/* Responsive */

@media(max-width:900px){

  .main-container{flex-direction:column}

  .map-section{flex:none;height:50vh}

  .project-panel{max-width:none;min-width:0;flex:1}

  .header{flex-wrap:wrap;height:auto;padding:8px}

  .header h1{font-size:1em}

  .info-grid{grid-template-columns:1fr}

}

</style>

// EXCEL READING

// ══════════════════════════════════════════�???

function parseExcel(data) {

  const workbook = XLSX.read(data, { type: 'array' });



  // Sheet 1: Setting

  const settingSheet = workbook.Sheets['Setting'] || workbook.Sheets['设置'];

  if (settingSheet) {

    const settingJson = XLSX.utils.sheet_to_json(settingSheet, { header: 1 });

    const types = new Set();

    const solutions = new Set();

    for (let i = 1; i < settingJson.length; i++) {

      const row = settingJson[i];

      if (row[0] && String(row[0]).trim()) types.add(String(row[0]).trim());

      if (row[1] && String(row[1]).trim()) solutions.add(String(row[1]).trim());

    }

    settingData.types = Array.from(types);

    settingData.solutions = Array.from(solutions);

  }



  // Sheet 2: 项目信息

  const infoSheet = workbook.Sheets['项目信息'] || workbook.Sheets['Project Info'] || workbook.Sheets[workbook.SheetNames[1]];

  if (!infoSheet) {

    console.error('No project info sheet found');

    return [];

  }

  const infoJson = XLSX.utils.sheet_to_json(infoSheet, { header: 1 });



  // Find header row (row 1 should be headers)

  const headers = infoJson[0];

  if (!headers) return [];



  // Map column indices from headers

  const colMap = {};

  headers.forEach((h, i) => {

    const s = String(h || '').toLowerCase();

    if (s.includes('项目名称') || s.includes('project name')) colMap.name = i;

    else if (s.includes('商机') || s.includes('opportunity')) colMap.oppId = i;

    else if (s.includes('责任') || s.includes('person') || s.includes('charge')) colMap.person = i;

    else if (s.includes('项目类型') || s.includes('project type')) colMap.type = i;

    else if (s.includes('解决方案') || s.includes('solution')) colMap.solution = i;

    else if (s.includes('起始') || s.includes('start')) colMap.startDate = i;

    else if (s.includes('结束') || s.includes('end')) colMap.endDate = i;

    else if (s.includes('状�?') || s.includes('status')) colMap.status = i;

    else if (s.includes('�???') || s.includes('state')) colMap.state = i;

    else if (s.includes('设备1') || s.includes('device 1')) colMap.dev1 = i;

    else if (s.includes('数量1') || s.includes('qty 1')) colMap.qty1 = i;

    else if (s.includes('设备2') || s.includes('device 2')) colMap.dev2 = i;

    else if (s.includes('数量2') || s.includes('qty 2')) colMap.qty2 = i;

    else if (s.includes('设备3') || s.includes('device 3')) colMap.dev3 = i;

    else if (s.includes('数量3') || s.includes('qty 3')) colMap.qty3 = i;

    else if (s.includes('设备4') || s.includes('device 4')) colMap.dev4 = i;

    else if (s.includes('数量4') || s.includes('qty 4')) colMap.qty4 = i;

    else if (s.includes('设备5') || s.includes('device 5')) colMap.dev5 = i;

    else if (s.includes('数量5') || s.includes('qty 5')) colMap.qty5 = i;

    else if (s.includes('备注') || s.includes('remark')) colMap.remarks = i;

  });



  const projects = [];

  for (let i = 1; i < infoJson.length; i++) {

    const row = infoJson[i];

    if (!row || !row[colMap.name]) continue; // skip empty rows



    const name = String(row[colMap.name] || '').trim();

    if (!name) continue;



    // Build devices array

    const devices = [];

    for (let d = 1; d <= 5; d++) {

      const devCol = colMap['dev' + d];

      const qtyCol = colMap['qty' + d];

      if (devCol !== undefined && row[devCol]) {

        devices.push({

          name: String(row[devCol] || '').trim(),

          qty: qtyCol !== undefined ? (row[qtyCol] || 0) : 0

        });

      }

    }



    // Calculate total devices

    let totalDevices = 0;

    devices.forEach(d => {

      const q = parseInt(d.qty) || 0;

      totalDevices += q;

    });



    // Normalize status

    let status = String(row[colMap.status] || 'maintenance').trim().toLowerCase();

    const statusMap = {

      '维护�???': 'maintenance', 'maintenance': 'maintenance',

      'in delivery': 'delivery', 'delivery': 'delivery',

      'poc': 'poc',

      '已完�???': 'done', 'done': 'done',

      '待处�???': 'pending', 'pending': 'pending',

      '处理�???': 'handling',

    };

    status = statusMap[status] || 'maintenance';



    projects.push({

      name: name,

      oppId: colMap.oppId !== undefined ? String(row[colMap.oppId] || '').trim() : '',

      person: colMap.person !== undefined ? String(row[colMap.person] || '').trim() : '',

      type: colMap.type !== undefined ? String(row[colMap.type] || '').trim() : '',

      solution: colMap.solution !== undefined ? String(row[colMap.solution] || '').trim() : '',

      startDate: colMap.startDate !== undefined ? String(row[colMap.startDate] || '').trim() : '',

      endDate: colMap.endDate !== undefined ? String(row[colMap.endDate] || '').trim() : '',

      status: status,

      statusText: status === 'maintenance' ? t('maintenance') : status === 'delivery' ? t('delivery') : status === 'poc' ? t('poc') : status === 'done' ? t('done') : t('pending'),

      state: colMap.state !== undefined ? String(row[colMap.state] || '').trim().toUpperCase() : '',

      devices: devices,

      totalDevices: totalDevices,

      remarks: colMap.remarks !== undefined ? String(row[colMap.remarks] || '').trim() : '',
        remarks_en: colMap.remarks_en !== undefined ? String(row[colMap.remarks_en] || '').trim() : '',
        remarks_pt: colMap.remarks_pt !== undefined ? String(row[colMap.remarks_pt] || '').trim() : '',

    });

  }



  return projects;

}

function showTooltip(e, code, name, projects) {

  const tt = document.getElementById('tooltip');

  header.innerHTML = name + ' (' + code + ')' +

    projects.forEach(p => {

      html += '<tr><td>' + p.name + '</td><td>' + p.solution + '</td><td>' + p.statusText + '</td></tr>';

    });

    html += '</tbody></table>';

    body.innerHTML = html;

  }



  tt.style.display = 'block';

  moveTooltip(e);

}



function moveTooltip(e) {

  const tt = document.getElementById('tooltip');

  let x = e.clientX + 15;

  let y = e.clientY + 15;

  // Keep within viewport

  if (x + 400 > window.innerWidth) x = e.clientX - 400;

  if (y + 300 > window.innerHeight) y = e.clientY - 320;

  tt.style.left = x + 'px';

  tt.style.top = y + 'px';

}



function hideTooltip() {

  document.getElementById('tooltip').style.display = 'none';

}

    '<div class="placeholder-icon">📋</div>' +

    '<div class="placeholder-text">' + t('placeholderTitle') + '</div>' +

    '<div class="placeholder-hint">' + t('placeholderHint') + '</div>' +

    '</div>';

}



function infoItem(label, value) {

}

// FILE UPLOAD

// ══════════════════════════════════════════�???

function handleFileUpload(event) {

  const file = event.target.files[0];

  if (!file) return;



  const reader = new FileReader();

  reader.onload = function(e) {

    try {

      const data = new Uint8Array(e.target.result);

      allProjects = parseExcel(data);

      console.log('�??? Uploaded ' + allProjects.length + ' projects');

      populateDropdowns();

      selectedState = null;

      currentStatusFilter = 'all';

      document.getElementById('btnReset').style.display = 'none';

      document.querySelectorAll('.filter-bar .filter-btn').forEach(b => b.classList.remove('active'));

      document.querySelector('.filter-bar .filter-btn.all').classList.add('active');

      document.getElementById('filterType').value = 'all';

      document.getElementById('filterSolution').value = 'all';

      filteredProjects = [...allProjects];

      updateUI();

      renderMap();

      renderProjectList();

      renderLegend();

      updateStats();

    } catch(err) {

      console.error('Upload error:', err);

      alert('Excel解析错误: ' + err.message + '\n请检查文件是否为标准.xlsx格式');

    }

  };

  reader.readAsArrayBuffer(file);

}
