<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>问题工单 — Delivery Master</title>
  <script src="../config.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif; }
    body { background: #F7F8FA; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
    
    /* Header - 绿色主题 */
    .header { height: 48px; background: linear-gradient(135deg, #2E7D32 0%, #1B5E20 100%); display: flex; align-items: center; padding: 0 16px; gap: 12px; flex-shrink: 0; }
    .back-btn { width: 28px; height: 28px; border: none; background: rgba(255,255,255,0.15); border-radius: 6px; cursor: pointer; display: flex; align-items: center; justify-content:center; transition: background .2s; }
    .back-btn:hover { background: rgba(255,255,255,0.25); }
    .back-btn svg { width: 16px; height: 16px; }
    .header-title { font-size: 15px; font-weight: 600; color: #fff; flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; min-width:0 }
    .header-user { display:flex; align-items:center; gap:8px; color:#fff; font-size:12px; white-space:nowrap }
    .btn-logout { padding:4px 10px; border:1px solid rgba(255,255,255,0.3); border-radius:4px; background:transparent; color:#fff; font-size:11px; cursor:pointer; transition:background .2s; white-space:nowrap}
    .btn-logout:hover { background:rgba(255,255,255,0.15) }
    
    /* Toolbar */
    .toolbar { height:auto; min-height:52px; background:#fff; border-bottom:1px solid #e8e8e8; display:flex; align-items:center; padding:0 16px; gap:12px; flex-shrink:0; flex-wrap:wrap }
    .btn-create { padding:8px 16px; background:#2E7D32; color:#fff; border:none; border-radius:6px; font-size:13px; cursor:pointer; display:flex; align-items:center; gap:6px; transition:background .2s; white-space:nowrap }
    .btn-create:hover { background:#1B5E20 }
    .filter-select { padding:6px 28px 6px 10px; border:1px solid #d0d5dd; border-radius:6px; font-size:12px; color:#333; background:#fff cursor:pointer }
    .search-input { padding:6px 10px; border:1px solid #d0d5dd; border-radius:6px; font-size:12px; width:160px; color:#333; margin-left:auto; flex:1; min-width:100px; max-width:200px }
    
    /* Table */
    .table-wrap { flex:1; overflow:auto; padding:16px; background:#f7f8fa }
    .tickets-table { width:100%; border-collapse:separate; border-spacing:0; background:#fff; border-radius:10px; overflow:hidden; box-shadow:0 1px 3px rgba(0,0,0,.04) }
    .tickets-table thead { position:sticky; top:0; z-index:5 }
    .tickets-table th { background:#f5f7fa; font-size:11px; font-weight:600; color:#666; text-align:left; padding:10px 12px; border-bottom:2px solid #e8e8e8; white-space:nowrap }
    .tickets-table td { padding:10px 12px; font-size:12px; color:#333; border-bottom:1px solid #f0f0f0; max-width:250px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap }
    .tickets-table tr:hover { background:#f8fafd }
    
    /* Status badges */
    .badge { display:inline-block; padding:2px 8px; border-radius:10px; font-size:10px; font-weight:500; white-space:nowrap }
    .badge.待处理,.badge.pending { background:#fff3e0; color:#e65100 }
    .badge.处理中,.badge.processing { background:#e3f2fd; color:#1565c0 }
    .badge.已解决,.badge.resolved { background:#e8f5e9; color:#2e7d32 }
    .badge.已关闭,.badge.closed { background:#f5f5f5; color:#616161 }
    
    /* Priority */
    .priority { display:inline-block; padding:2px 6px; border-radius:4px; font-size:10px; font-weight:500; white-space:nowrap }
    .priority.低,.priority.low { background:#e8f5e9; color:#2e7d32 }
    .priority.中,.priority.medium { background:#fff3e0; color:#e65100 }
    .priority.高,.priority.high { background:#fce4ec; color:#c62828 }
    .priority.紧急,.priority.urgent { background:#b71c1c; color:#fff }
    
    /* Action buttons */
    .btn-action { padding:4px 8px; border:1px solid #d0d5dd; border-radius:4px; background:#fff; color:#333; font-size:11px; cursor:pointer; margin-right:4px; transition:all .2s; white-space:nowrap }
    .btn-action:hover { background:#f5f5f5 }
    .btn-action.edit { color:#2E7D32; border-color:#2E7D32 }
    .btn-action.delete { color:#c62828; border-color:#c62828 }
    
    /* Modal */
    .modal-overlay { position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,0.5); display:none; justify-content:center; align-items:center; z-index:1000 }
    .modal-overlay.active { display:flex }
    .modal { background:#fff; border-radius:12px; padding:24px; width:100%; max-width:500px; max-height:90vh; overflow-y:auto }
    .modal-header { font-size:18px; font-weight:600; color:#1a1c21; margin-bottom:20px }
    .form-group { margin-bottom:16px }
    .form-group label { display:block; font-size:13px; font-weight:500; color:#333; margin-bottom:6px }
    .form-group input, .form-group textarea, .form-group select { width:100%; padding:8px 10px; border:1px solid #d0d5dd; border-radius:6px; font-size:13px; color:#333 }
    .form-group textarea { resize:vertical; min-height:80px }
    .modal-actions { display:flex; gap:8px; justify-content:flex-end; margin-top:20px }
    .btn-cancel { padding:8px 16px; border:1px solid #d0d5dd; border-radius:6px; background:#fff; color:#333; font-size:13px; cursor:pointer }
    .btn-save { padding:8px 16px; border:none; border-radius:6px; background:#2E7D32; color:#fff; font-size:13px; cursor:pointer }
    .btn-save:hover { background:#1B5E20 }
    
    /* Loading */
    .loading { display:flex; align-items:center; justify-content:center; padding:60px; color:#bbb; font-size:13px; gap:8px }
    .spinner { width:18px; height:18px; border:2px solid #e0e0e0; border-top-color:#2E7D32; border-radius:50%; animation:spin .6s linear infinite }
    @keyframes spin { to { transform:rotate(360deg)} }
    
    /* Empty state */
    .empty-state { display:flex; flex-direction:column; align-items:center; justify-content:center; padding:60px 20px; color:#bbb; gap:10px }

    @media(max-width:768px){
      .toolbar{padding:10px 12px;gap:8px}
      .search-input{width:120px;max-width:150px}
      .header-title{font-size:13px}
      .header-user{display:none}
      .btn-action{padding:3px 6px;font-size:10px}
      .tickets-table td{padding:8px 8px;font-size:11px;max-width:180px}
    }
  </style>
</head>
<body>

<header class="header">
  <button class="back-btn" onclick="window.location.href='../index.html'" title="返回首页">
    <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2"><path d="M19 12H5m7-7l-7 7 7 7" stroke-linecap="round"/></svg>
  </button>
  <span class="header-title" id="pageTitle">问题工单</span>
  <div class="header-user">
    <span id="currentUser">加载中...</span>
    <button class="btn-logout" id="btnLogout" onclick="logout()">退出</button>
  </div>
</header>

<div class="toolbar" id="toolbar">
  <button class="btn-create" id="btnNewTicket" onclick="openCreateModal()">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
    新建工单
  </button>
  <select class="filter-select" id="statusFilter" onchange="filterTickets()"></select>
  <select class="filter-select" id="priorityFilter" onchange="filterTickets()"></select>
  <input class="search-input" type="text" id="searchInput" placeholder="搜索工单..." oninput="filterTickets()">
</div>

<div class="table-wrap">
  <div class="loading" id="loading">
    <div class="spinner"></div> 加载中...
  </div>
  
  <div class="empty-state" id="emptyState" style="display:none">
    <p id="emptyText">暂无工单记录</p>
    <p style="font-size: 12px;" id="emptyHint">点击"新建工单"创建第一个工单</p>
  </div>
  
  <table class="tickets-table" id="ticketsTable" style="display:none">
    <thead id="tableHead">
      <tr>
        <th>ID</th><th>标题</th><th>项目</th><th>状态</th><th>优先级</th><th>创建人</th><th>负责人</th><th>创建时间</th><th>操作</th>
      </tr>
    </thead>
    <tbody id="ticketsBody"></tbody>
  </table>
</div>

<!-- Create/Edit Modal -->
<div class="modal-overlay" id="ticketModal">
  <div class="modal">
    <div class="modal-header" id="modalTitle">新建工单</div>
    <form id="ticketForm">
      <input type="hidden" id="ticketId">
      
      <div class="form-group">
        <label for="ticketProject">项目 *</label>
        <select id="ticketProject" required></select>
      </div>
      
      <div class="form-group">
        <label for="ticketTitle">标题 *</label>
        <input type="text" id="ticketTitle" required placeholder="请输入工单标题">
      </div>
      
      <div class="form-group">
        <label for="ticketDescription">描述 *</label>
        <textarea id="ticketDescription" required placeholder="请详细描述问题或需求"></textarea>
      </div>
      
      <div class="form-group">
        <label for="ticketPriority">优先级</label>
        <select id="ticketPriority"></select>
      </div>
      
      <div class="form-group">
        <label for="ticketStatus">状态</label>
        <select id="ticketStatus"></select>
      </div>
      
      <div class="form-group">
        <label for="ticketAssigned">负责人</label>
        <input type="text" id="ticketAssigned" placeholder="请输入负责人">
      </div>
      
      <div class="modal-actions">
        <button type="button" class="btn-cancel" id="btnCancelModal" onclick="closeModal()">取消</button>
        <button type="submit" class="btn-save">保存</button>
      </div>
    </form>
  </div>
</div>

<script src="../i18n/index.js"></script>
<script>
  // ===== Platform Detection =====
  var IS_NATIVE = typeof Capacitor !== 'undefined' && Capacitor.isNativePlatform();

  // ===== Auth Check (skip in native APP) =====
  if (!IS_NATIVE) {
  (function checkAuth() {
    const token = localStorage.getItem('token');
    const user = localStorage.getItem('user');
    if (!token || !user) {
      window.location.href = '../login.html';
    }
  })();
  }
  
  // ===== Config =====
  var API_BASE = window.location.origin;
  var allTickets = [];
  var currentUser = {};
  var PROJECTS_DATA = null;
  var lang = localStorage.getItem('lang') || 'zh';
  
  // ===== i18n helper =====
  function t(key) {
    const keys = key.split('.');
    let val = window.i18n?.[lang] || window.i18n?.['zh'] || {};
    for (const k of keys) {
      if (val === undefined || val === null) return key;
      val = val[k];
    }
    return val || key;
  }
  
  function applyI18n() {
    document.getElementById('pageTitle').textContent = t('tickets.title');
    document.getElementById('btnNewTicket').innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg> ' + t('tickets.btn_new_ticket');
    document.getElementById('searchInput').placeholder = t('tickets.search_placeholder');
    document.getElementById('btnLogout').textContent = t('tickets.btn_logout');
    document.getElementById('emptyText').textContent = t('tickets.empty');
    document.getElementById('emptyHint').textContent = t('tickets.empty_hint');
    document.getElementById('btnCancelModal').textContent = t('tickets.btn_cancel');
    
    // Table header
    const thRow = document.querySelector('#tableHead tr');
    if(thRow) {
      thRow.innerHTML = '<th>' + t('tickets.th_id') + '</th><th>' + t('tickets.th_title') + '</th><th>' + t('tickets.th_project') + '</th><th>' + t('tickets.th_status') + '</th><th>' + t('tickets.th_priority') + '</th><th>' + t('tickets.th_creator') + '</th><th>' + t('tickets.th_assignee') + '</th><th>' + t('tickets.th_created_at') + '</th><th>' + t('tickets.th_actions') + '</th>';
    }
  }
  
  // ===== Init =====
  (function() {
    applyI18n();
    loadProjects();
    document.title = t('tickets.title') + ' — Delivery Master';
    currentUser = JSON.parse(localStorage.getItem('user') || '{}');
    document.getElementById('currentUser').textContent = currentUser.username || t('tickets.user_unknown');
    buildSelectOptions();
    loadTickets();
  })();
  
  // ===== Load Projects from unified source (NO Hikvision test data!) =====
  function loadProjects() {
    fetch('../_data/projects.json')
      .then(function(r) { return r.json(); })
      .then(function(data) {
        PROJECTS_DATA = data.projects;
        // Rebuild modal project select now that we have data
        buildProjectSelectInModal();
      })
      .catch(function() { console.warn('Could not load projects.json'); });
  }
  
  // ===== Build filter selects using i18n =====
  function buildSelectOptions() {
    // Status filter
    var sf = document.getElementById('statusFilter');
    sf.innerHTML =
      '<option value="">' + t('tickets.filter_all_status') + '</option>' +
      '<option value="pending">' + t('tickets.status_pending') + '</option>' +
      '<option value="processing">' + t('tickets.status_processing') + '</option>' +
      '<option value="resolved">' + t('tickets.status_resolved') + '</option>' +
      '<option value="closed">' + t('tickets.status_closed') + '</option>';
    
    // Priority filter
    var pf = document.getElementById('priorityFilter');
    pf.innerHTML =
      '<option value="">' + t('tickets.filter_all_priority') + '</option>' +
      '<option value="low">' + t('tickets.priority_low') + '</option>' +
      '<option value="medium">' + t('tickets.priority_medium') + '</option>' +
      '<option value="high">' + t('tickets.priority_high') + '</option>' +
      '<option value="urgent">' + t('tickets.priority_urgent') + '</option>';
    
    // Modal status select
    var ms = document.getElementById('ticketStatus');
    ms.innerHTML =
      '<option value="pending">' + t('tickets.status_pending') + '</option>' +
      '<option value="processing">' + t('tickets.status_processing') + '</option>' +
      '<option value="resolved">' + t('tickets.status_resolved') + '</option>' +
      '<option value="closed">' + t('tickets.status_closed') + '</option>';
    
    // Modal priority select (default medium)
    var mp = document.getElementById('ticketPriority');
    mp.innerHTML =
      '<option value="low">' + t('tickets.priority_low') + '</option>' +
      '<option value="medium" selected>' + t('tickets.priority_medium') + '</option>' +
      '<option value="high">' + t('tickets.priority_high') + '</option>' +
      '<option value="urgent">' + t('tickets.priority_urgent') + '</option>';
  }
  
  // Build modal project select from projects.json
  function buildProjectSelectInModal() {
    var sel = document.getElementById('ticketProject');
    if (!sel) return;
    
    if (PROJECTS_DATA && PROJECTS_DATA.length > 0) {
      sel.innerHTML = '<option value="">' + t('tickets.placeholder_select_project') + '</option>';
      PROJECTS_DATA.forEach(function(p) {
        sel.innerHTML += '<option value="' + p.name + '">' + p.name + '</option>';
      });
    } else {
      // Fallback while loading
      sel.innerHTML = '<option value="">' + t('tickets.placeholder_select_project') + '...</option>';
    }
  }
  
  // ===== API Helper =====
  function apiFetch(url, options) {
    const token = localStorage.getItem('token');
    const headers = {
      'Content-Type': 'application/json',
      ...options?.headers
    };
    if (token) {
      headers['Authorization'] = 'Bearer ' + token;
    }
    return fetch(url, {
      ...options,
      headers
    }).then(function(r) {
      if (r.status === 401 && !IS_NATIVE) {
        localStorage.removeItem('token');
        localStorage.removeItem('user');
        window.location.href = '../login.html';
        return Promise.reject('Unauthorized');
      }
      return r;
    });
  }
  
  // ===== Logout =====
  function logout() {
    localStorage.removeItem('token');
    localStorage.removeItem('user');
    if (!IS_NATIVE) window.location.href = '../login.html';
    else window.location.href = '../index.html';
  }
  
  // ===== Load Tickets =====
  function loadTickets() {
    showLoading(true);
    apiFetch(API_BASE + '/api/issues')
      .then(function(r) { return r.json(); })
      .then(function(tickets) {
        allTickets = tickets;
        renderTickets();
        showLoading(false);
      })
      .catch(function(e) {
        console.error('Failed to load tickets:', e);
        showLoading(false);
        alert(t('tickets.load_fail') + e);
      });
  }
  
  // ===== Render Tickets =====
  function renderTickets() {
    const tbody = document.getElementById('ticketsBody');
    tbody.innerHTML = '';
    
    const filtered = getFilteredTickets();
    
    if (filtered.length === 0) {
      document.getElementById('ticketsTable').style.display = 'none';
      document.getElementById('emptyState').style.display = 'flex';
      return;
    }
    
    document.getElementById('emptyState').style.display = 'none';
    document.getElementById('ticketsTable').style.display = 'table';
    
    for (let i = 0; i < filtered.length; i++) {
      const ticket = filtered[i];
      const tr = document.createElement('tr');
      
      // ID
      const tdId = document.createElement('td');
      tdId.textContent = ticket.id;
      tr.appendChild(tdId);
      
      // Title
      const tdTitle = document.createElement('td');
      tdTitle.textContent = ticket.title;
      tdTitle.style.fontWeight = '500';
      tr.appendChild(tdTitle);
      
      // Project
      const tdProject = document.createElement('td');
      tdProject.textContent = ticket.project || '-';
      tr.appendChild(tdProject);
      
      // Status
      const tdStatus = document.createElement('td');
      tdStatus.innerHTML = '<span class="badge ' + (ticket.status || '') + '">' + (ticket.status || '-') + '</span>';
      tr.appendChild(tdStatus);
      
      // Priority
      const tdPriority = document.createElement('td');
      tdPriority.innerHTML = '<span class="priority ' + (ticket.priority || '') + '">' + (ticket.priority || '-') + '</span>';
      tr.appendChild(tdPriority);
      
      // Created by
      const tdCreator = document.createElement('td');
      tdCreator.textContent = ticket.created_by || '-';
      tr.appendChild(tdCreator);
      
      // Assigned to
      const tdAssigned = document.createElement('td');
      tdAssigned.textContent = ticket.assigned_to || '-';
      tr.appendChild(tdAssigned);
      
      // Created at
      const tdCreated = document.createElement('td');
      tdCreated.textContent = ticket.created_at ? ticket.created_at.split('T')[0] : '-';
      tr.appendChild(tdCreated);
      
      // Actions
      const tdActions = document.createElement('td');
      const editBtn = document.createElement('button');
      editBtn.className = 'btn-action edit';
      editBtn.textContent = t('tickets.btn_edit');
      editBtn.onclick = (function(t) { return function() { openEditModal(t); }; })(ticket);
      tdActions.appendChild(editBtn);
      
      const deleteBtn = document.createElement('button');
      deleteBtn.className = 'btn-action delete';
      deleteBtn.textContent = t('tickets.btn_delete');
      deleteBtn.onclick = (function(id) { return function() { deleteTicket(id); }; })(ticket.id);
      tdActions.appendChild(deleteBtn);
      
      tr.appendChild(tdActions);
      
      tbody.appendChild(tr);
    }
  }
  
  // ===== Filter Tickets =====
  function getFilteredTickets() {
    let filtered = allTickets.slice();
    
    const statusFilter = document.getElementById('statusFilter').value;
    const priorityFilter = document.getElementById('priorityFilter').value;
    const searchQuery = document.getElementById('searchInput').value.trim().toLowerCase();
    
    if (statusFilter) {
      filtered = filtered.filter(function(t) { return t.status === statusFilter; });
    }
    
    if (priorityFilter) {
      filtered = filtered.filter(function(t) { return t.priority === priorityFilter; });
    }
    
    if (searchQuery) {
      filtered = filtered.filter(function(t) {
        const text = (t.id || '') + ' ' + (t.title || '') + ' ' + (t.description || '') + ' ' + (t.project || '');
        return text.toLowerCase().indexOf(searchQuery) !== -1;
      });
    }
    
    // Sort by ID desc
    filtered.sort(function(a, b) { return b.id - a.id; });
    
    return filtered;
  }
  
  function filterTickets() {
    renderTickets();
  }
  
  // ===== Modal Operations =====
  function openCreateModal() {
    document.getElementById('modalTitle').textContent = t('tickets.modal_nov');
    document.getElementById('ticketForm').reset();
    document.getElementById('ticketId').value = '';
    document.getElementById('ticketStatus').value = 'pending';
    document.getElementById('ticketPriority').value = 'medium';
    buildProjectSelectInModal();
    document.getElementById('ticketModal').classList.add('active');
  }
  
  function openEditModal(ticket) {
    document.getElementById('modalTitle').textContent = t('tickets.modal_edit');
    document.getElementById('ticketId').value = ticket.id;
    document.getElementById('ticketProject').value = ticket.project || '';
    document.getElementById('ticketTitle').value = ticket.title || '';
    document.getElementById('ticketDescription').value = ticket.description || '';
    document.getElementById('ticketPriority').value = ticket.priority || 'medium';
    document.getElementById('ticketStatus').value = ticket.status || 'pending';
    document.getElementById('ticketAssigned').value = ticket.assigned_to || '';
    buildProjectSelectInModal();
    // Set selected after building
    setTimeout(function(){
      const psel = document.getElementById('ticketProject');
      if(psel && ticket.project) psel.value = ticket.project;
    }, 0);
    document.getElementById('ticketModal').classList.add('active');
  }
  
  function closeModal() {
    document.getElementById('ticketModal').classList.remove('active');
  }
  
  // ===== Save Ticket =====
  document.getElementById('ticketForm').addEventListener('submit', function(e) {
    e.preventDefault();
    
    const ticketId = document.getElementById('ticketId').value;
    const projEl = document.getElementById('ticketProject');
    const ticketData = {
      project: projEl ? projEl.value : '',
      title: document.getElementById('ticketTitle').value,
      description: document.getElementById('ticketDescription').value,
      priority: document.getElementById('ticketPriority').value,
      status: document.getElementById('ticketStatus').value,
      assigned_to: document.getElementById('ticketAssigned').value,
      created_by: currentUser.id
    };
    
    if (ticketId) {
      // Update
      ticketData.id = parseInt(ticketId);
      apiFetch(API_BASE + '/api/issues/' + ticketId, {
        method: 'PUT',
        body: JSON.stringify(ticketData)
      })
        .then(function(r) { return r.json(); })
        .then(function(data) {
          closeModal();
          loadTickets();
          alert(t('tickets.alert_update_success'));
        })
        .catch(function(e) {
          alert(t('tickets.alert_update_fail') + e);
        });
    } else {
      // Create
      apiFetch(API_BASE + '/api/issues', {
        method: 'POST',
        body: JSON.stringify(ticketData)
      })
        .then(function(r) { return r.json(); })
        .then(function(data) {
          closeModal();
          loadTickets();
          alert(t('tickets.alert_create_success'));
        })
        .catch(function(e) {
          alert(t('tickets.alert_create_fail') + e);
        });
    }
  });
  
  // ===== Delete Ticket =====
  function deleteTicket(id) {
    if (!confirm(t('tickets.confirm_delete').replace('{id}', id))) {
      return;
    }
    
    apiFetch(API_BASE + '/api/issues/' + id, {
      method: 'DELETE'
    })
      .then(function(r) { return r.json(); })
      .then(function(data) {
        loadTickets();
        alert(t('tickets.alert_delete_success'));
      })
      .catch(function(e) {
        alert(t('tickets.alert_delete_fail') + e);
      });
  }
  
  // ===== Loading =====
  function showLoading(on) {
    document.getElementById('loading').style.display = on ? 'flex' : 'none';
  }
</script>

</body>
</html>
