name: Build & Release Android APK

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

permissions:
  contents: write  # 需要写权限来创建Release和tag

jobs:
  build:
    name: Build & Release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install npm dependencies
        run: npm install

      - name: Sync web assets to Android
        run: npx cap sync android

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant execute permission for gradlew
        run: chmod +x android/gradlew

      - name: Build Debug APK
        run: |
          cd android
          ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload Debug APK as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      # ===== Auto Publish to GitHub Releases =====
      - name: Generate version tag
        id: version
        run: echo "tag=v$(date +'%Y%m%d')-build${{ github.run_number }}" >> $GITHUB_OUTPUT

      - name: Create GitHub Release with APK
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "Delivery Master ${{ steps.version.outputs.tag }}"
          body: |
            ## Delivery Master (交维大师) Android APP

            **Build #${{ github.run_number }}** | Commit: ${{ github.sha }}

            ### 安装说明 / Instalação
            - 📱 手机扫码下载 → 安装时允许"未知来源" → 打开即用
            - 📲 Scan QR code → Allow "Unknown Sources" → Open and enjoy
            - 离线可用 / Works offline / Funciona offline

            ### 功能 / Features
            - 项目地图 / Project Map
            - 周报浏览 / Weekly Reports
            - 白板墙 / Kanban Board
            - 需求跟踪 / Demand Tracking
            - 中/英/葡 三语切换 / CN/EN/PT trilingual
          files: android/app/build/outputs/apk/debug/app-debug.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
